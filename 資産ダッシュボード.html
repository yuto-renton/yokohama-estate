<!DOCTYPE html>
<html lang="ja">

  <style>

    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 4px;
      border-radius: 2px;
      background: #e0e4ff;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #4361ee;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(67,97,238,0.4);
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #4361ee;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(67,97,238,0.4);
    }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 10px 12px; text-align: left; font-size: 12px; border-bottom: 1px solid #f0f0f0; }
    th {
      background: #f8f9ff;
      font-weight: 700;
      color: #555;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      position: sticky;
      top: 0;
    }
    th:hover { background: #eef0ff; }
    tr:hover td { background: #fafbff; }
    @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
    .skeleton {
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
      animation: pulse 1.5s ease-in-out infinite;
      display: inline-block;
    }
    @media (max-width: 600px) {
      th, td { padding: 7px 5px; font-size: 11px; }
    }
  </style>
</head>

    /* ============================================================
       Market info bar
    ============================================================ */
    function MarketBar() {
      const [prices, setPrices] = useState({});
      const [loading, setLoading]  = useState(true);
      const [fetchErr, setFetchErr] = useState(false);

      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const results = await Promise.allSettled(
              TICKERS.map(t =>
                fetch(
                  `https://corsproxy.io/?${encodeURIComponent(
                    `https://query1.finance.yahoo.com/v8/finance/chart/${t.symbol}`
                  )}`
                )
                .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
                .then(d => {
                  const meta = d.chart.result[0].meta;
                  return {
                    symbol: t.symbol,
                    price:  meta.regularMarketPrice,
                    prev:   meta.chartPreviousClose ?? meta.previousClose ?? meta.regularMarketPrice,
                  };
                })
              )
            );
            if (cancelled) return;
            const map = {};
            results.forEach((r, i) => {
              if (r.status === "fulfilled") map[TICKERS[i].symbol] = r.value;
            });
            setPrices(map);
          } catch (_) {
            if (!cancelled) setFetchErr(true);
          } finally {
            if (!cancelled) setLoading(false);
          }
        })();
        return () => { cancelled = true; };
      }, []);

      return (
        <div style={{ background:"#0f0f23", padding:"10px 32px", overflowX:"auto" }}>
          <div style={{
            maxWidth:800, margin:"0 auto",
            display:"flex", gap:32, alignItems:"center",
            minWidth:"fit-content"
          }}>
            <span style={{ fontSize:10, color:"#4361ee", fontWeight:700, letterSpacing:2, whiteSpace:"nowrap" }}>
              MARKET
            </span>
            {TICKERS.map(t => {
              const d = prices[t.symbol];
              const chg = d ? (d.price - d.prev) / d.prev * 100 : null;
              const up  = chg > 0;
              return (
                <div key={t.symbol} style={{ display:"flex", gap:8, alignItems:"baseline", whiteSpace:"nowrap" }}>
                  <span style={{ fontSize:11, color:"#888" }}>{t.label}</span>
                  {loading ? (
                    <span className="skeleton" style={{ width:80, height:15 }} />
                  ) : fetchErr || !d ? (
                    <span style={{ fontSize:13, color:"#555" }}>— —</span>
                  ) : (
                    <>
                      <span style={{ fontSize:15, fontWeight:800, color:"white" }}>{t.fmt(d.price)}</span>
                      <span style={{ fontSize:11, color: up ? "#06d6a0" : "#f72585" }}>
                        {up ? "▲" : "▼"}{Math.abs(chg).toFixed(2)}%
                      </span>
                    </>
                  )}
                </div>
              );
            })}
            {!loading && !fetchErr && (
              <span style={{ fontSize:10, color:"#444", marginLeft:"auto", whiteSpace:"nowrap" }}>
                起動時取得
              </span>
            )}
          </div>
        </div>
      );
    }

    /* ============================================================
       Stock Screener tab
    ============================================================ */
    function ScreenerTab() {
      const [maxPer, setMaxPer] = useState(50);
      const [maxPbr, setMaxPbr] = useState(10);
      const [minRoe, setMinRoe] = useState(0);
      const [minDiv, setMinDiv] = useState(0);
      const [sortKey, setSortKey] = useState("cap");
      const [sortDir, setSortDir] = useState("desc");

      const handleSort = (key) => {
        if (sortKey === key) setSortDir(d => d === "asc" ? "desc" : "asc");
        else { setSortKey(key); setSortDir("desc"); }
      };

      const filtered = useMemo(() => (
        [...STOCKS]
          .filter(s => s.per <= maxPer && s.pbr <= maxPbr && s.roe >= minRoe && s.div >= minDiv)
          .sort((a, b) => {
            const av = a[sortKey], bv = b[sortKey];
            if (typeof av === "string") return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
            return sortDir === "asc" ? av - bv : bv - av;
          })
      ), [maxPer, maxPbr, minRoe, minDiv, sortKey, sortDir]);

      const SortIcon = ({ k }) => {
        if (sortKey !== k) return <span style={{ opacity:0.25, marginLeft:3 }}>↕</span>;
        return <span style={{ color:"#4361ee", marginLeft:3 }}>{sortDir === "asc" ? "↑" : "↓"}</span>;
      };

      const COLS = [
        { key:"code",   label:"コード",     str:true  },
        { key:"name",   label:"銘柄名",     str:true  },
        { key:"sector", label:"セクター",   str:true  },
        { key:"per",    label:"PER(倍)"              },
        { key:"pbr",    label:"PBR(倍)"              },
        { key:"roe",    label:"ROE(%)"               },
        { key:"div",    label:"配当(%)"              },
        { key:"cap",    label:"時価総額(億)"          },
        { key:"price",  label:"株価(円)"             },
      ];

      const cellColor = (key, v) => {
        if (key === "per")  return v < 12 ? "#06d6a0" : v > 30 ? "#f72585" : "#333";
        if (key === "pbr")  return v < 1  ? "#06d6a0" : v > 5  ? "#f72585" : "#333";
        if (key === "roe")  return v > 20 ? "#06d6a0" : v < 7  ? "#f72585" : "#333";
        if (key === "div")  return v >= 3 ? "#06d6a0" : "#333";
        return "#333";
      };

      return (
        <div style={{ display:"flex", flexDirection:"column", gap:20 }}>

          {/* Filter panel */}
          <div style={{
            background:"white", borderRadius:20, padding:"28px 32px",
            boxShadow:"0 2px 20px rgba(0,0,0,0.06)", borderTop:"4px solid #f4a261"
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
              <h2 style={{ margin:0, fontSize:15, fontWeight:700, color:"#333", letterSpacing:2 }}>
                🔍 スクリーニング条件
              </h2>
              <button onClick={() => { setMaxPer(50); setMaxPbr(10); setMinRoe(0); setMinDiv(0); }} style={{
                padding:"8px 18px", borderRadius:50, border:"1px solid #ddd",
                background:"white", cursor:"pointer", fontSize:12, fontWeight:600, color:"#666"
              }}>✕ 条件リセット</button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))", gap:"0 24px" }}>
              <Slider label="PER 上限"       value={maxPer} min={5}   max={100} step={1}   onChange={setMaxPer} unit="倍以下" />
              <Slider label="PBR 上限"       value={maxPbr} min={0.5} max={15}  step={0.5} onChange={setMaxPbr} unit="倍以下" />
              <Slider label="ROE 下限"       value={minRoe} min={0}   max={40}  step={0.5} onChange={setMinRoe} unit="% 以上" />
              <Slider label="配当利回り 下限" value={minDiv} min={0}   max={6}   step={0.1} onChange={setMinDiv} unit="% 以上" />
            </div>
          </div>

          {/* Results panel */}
          <div style={{
            background:"white", borderRadius:20, padding:"24px 24px",
            boxShadow:"0 2px 20px rgba(0,0,0,0.06)", borderTop:"4px solid #4361ee"
          }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <h2 style={{ margin:0, fontSize:15, fontWeight:700, color:"#333", letterSpacing:2 }}>
                📊 スクリーニング結果
              </h2>
              <div style={{
                background:"#f0f4ff", borderRadius:20, padding:"4px 16px",
                fontSize:13, fontWeight:800, color:"#4361ee"
              }}>
                {filtered.length} <span style={{ fontWeight:400, fontSize:12 }}>/ {STOCKS.length} 銘柄</span>
              </div>
            </div>

            {filtered.length === 0 ? (
              <div style={{ textAlign:"center", padding:"48px 0", color:"#bbb", fontSize:14 }}>
                条件に合致する銘柄がありません
              </div>
            ) : (
              <div style={{ overflowX:"auto" }}>
                <table>
                  <thead>
                    <tr>
                      {COLS.map(c => (
                        <th key={c.key}
                          onClick={() => handleSort(c.key)}
                          style={{ fontSize:12 }}>
                          {c.label}<SortIcon k={c.key} />
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map(s => (
                      <tr key={s.code}>
                        <td style={{ color:"#4361ee", fontWeight:700, fontFamily:"monospace", fontSize:12 }}>{s.code}</td>
                        <td style={{ fontWeight:600, fontSize:12, whiteSpace:"nowrap" }}>{s.name}</td>
                        <td>
                          <span style={{
                            background:"#f0f4ff", borderRadius:20, padding:"2px 10px",
                            fontSize:10, color:"#4361ee", fontWeight:600, whiteSpace:"nowrap"
                          }}>{s.sector}</span>
                        </td>
                        {["per","pbr","roe","div"].map(k => (
                          <td key={k} style={{ color:cellColor(k, s[k]), fontWeight:600 }}>
                            {s[k].toFixed(1)}
                          </td>
                        ))}
                        <td style={{ color:"#333" }}>{s.cap.toLocaleString()}</td>
                        <td style={{ fontWeight:600 }}>{s.price.toLocaleString()}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}

            {/* Color legend */}
            <div style={{ display:"flex", gap:20, marginTop:14, flexWrap:"wrap" }}>
              {[
                { color:"#06d6a0", text:"割安 / 高ROE / 高配当" },
                { color:"#f72585", text:"割高 / 低ROE" },
              ].map((l,i) => (
                <span key={i} style={{ fontSize:11, color:"#999", display:"flex", alignItems:"center", gap:5 }}>
                  <span style={{ display:"inline-block", width:10, height:10, borderRadius:2, background:l.color }} />
                  {l.text}
                </span>
              ))}
            </div>
            <div style={{ marginTop:8, fontSize:11, color:"#ccc" }}>
              ※ 表示データは参考値です。実際の投資判断は必ずご自身でご確認ください。
            </div>
          </div>
        </div>
      );
    }

    /* ============================================================
       Main Dashboard
    ============================================================ */
    function Dashboard() {
      // 住宅
      const [rent,         setRent]         = useState(12.2);
      const [subsidy,      setSubsidy]      = useState(4);
      const [subsidyYears, setSubsidyYears] = useState(8);
      const [buyPrice,     setBuyPrice]     = useState(5000);
      const [downPay,      setDownPay]      = useState(500);
      const [rate,         setRate]         = useState(1.5);
      const [loanYears,    setLoanYears]    = useState(35);
      // NISA
      const [nisaMonthly, setNisaMonthly] = useState(3);
      const [nisaYears,   setNisaYears]   = useState(20);
      const [nisaReturn,  setNisaReturn]  = useState(5);
      // 家計
      const [myContrib,   setMyContrib]   = useState(14);
      const [wifeContrib, setWifeContrib] = useState(10);
      // Tab
      const [tab, setTab] = useState(0);

      /* ---- Derived values ---- */
      const housing = useMemo(() => {
        const loanAmt = buyPrice - downPay;
        const monthlyRate = rate / 100 / 12;
        const n = loanYears * 12;
        const monthlyLoan = loanAmt * 10000 * monthlyRate * Math.pow(1 + monthlyRate, n)
          / (Math.pow(1 + monthlyRate, n) - 1) / 10000;
        const totalLoan     = monthlyLoan * n;
        const totalInterest = totalLoan - loanAmt;
        const rentNet       = (rent - subsidy) * 12 * subsidyYears + rent * 12 * (loanYears - subsidyYears);
        const buyTotal      = downPay + totalLoan;
        const diff          = rentNet - buyTotal;
        return {
          monthlyLoan: Math.round(monthlyLoan * 10) / 10,
          totalInterest: Math.round(totalInterest),
          buyTotal: Math.round(buyTotal),
          rentNet:  Math.round(rentNet),
          diff:     Math.round(diff),
          loanAmt,
        };
      }, [rent, subsidy, subsidyYears, buyPrice, downPay, rate, loanYears]);

      const nisa = useMemo(() => {
        let total = 0;
        const chartData = [];
        for (let y = 1; y <= nisaYears; y++) {
          for (let m = 0; m < 12; m++) {
            total = (total + nisaMonthly * 10000) * (1 + nisaReturn / 100 / 12);
          }
          if (y % 5 === 0 || y === nisaYears) chartData.push({ label:`${y}年`, val: total / 10000 });
        }
        const invested = nisaMonthly * 12 * nisaYears;
        const gain     = total / 10000 - invested;
        return { total: total / 10000, invested, gain: Math.round(gain), chartData };
      }, [nisaMonthly, nisaYears, nisaReturn]);

      const household = useMemo(() => {
        const total        = myContrib + wifeContrib;
        const afterHousing = total - (rent - subsidy);
        return { total, afterHousing: Math.round(afterHousing * 10) / 10 };
      }, [myContrib, wifeContrib, rent, subsidy]);

      const TABS = ["🏠 住宅", "📈 NISA", "💰 家計", "🔍 株スクリーニング"];

      return (
        <div style={{
          minHeight:"100vh",
          background:"linear-gradient(135deg,#f0f4ff 0%,#fafbff 100%)",
          fontFamily:"'Hiragino Sans','Yu Gothic','Meiryo',sans-serif",
          padding:"0 0 60px"
        }}>

          {/* Market bar */}
          <MarketBar />

          {/* Header */}
          <div style={{ background:"#1a1a2e", padding:"32px 32px 28px", color:"white" }}>
            <div style={{ maxWidth:800, margin:"0 auto" }}>
              <div style={{ fontSize:11, letterSpacing:3, opacity:0.5, marginBottom:8, textTransform:"uppercase" }}>
                Financial Dashboard
              </div>
              <h1 style={{ margin:0, fontSize:26, fontWeight:800, letterSpacing:-0.5 }}>資産形成ダッシュボード</h1>
              <p style={{ margin:"8px 0 0", opacity:0.5, fontSize:13 }}>
                住宅購入 × NISA積立 × 家計バランス × 日本株スクリーニング
              </p>
            </div>
          </div>

          {/* Summary bar */}
          <div style={{ background:"#4361ee", padding:"16px 32px" }}>
            <div style={{ maxWidth:800, margin:"0 auto", display:"flex", gap:32, flexWrap:"wrap" }}>
              {[
                { label:"住宅ローン月返済", value:`${housing.monthlyLoan}万円` },
                { label:"NISA最終評価額",   value: formatOkuMan(nisa.total) },
                { label:"家計余力（月）",    value:`${household.afterHousing}万円` },
              ].map((s,i) => (
                <div key={i} style={{ color:"white" }}>
                  <div style={{ fontSize:11, opacity:0.7, marginBottom:2 }}>{s.label}</div>
                  <div style={{ fontSize:20, fontWeight:800 }}>{s.value}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Body */}
          <div style={{ maxWidth:800, margin:"0 auto", padding:"32px 16px 0" }}>

            {/* Tab switcher */}
            <div style={{ display:"flex", gap:8, marginBottom:24, flexWrap:"wrap" }}>
              {TABS.map((t,i) => (
                <button key={i} onClick={() => setTab(i)} style={{
                  padding:"10px 22px", borderRadius:50, border:"none", cursor:"pointer",
                  fontSize:13, fontWeight:700,
                  background: tab === i ? "#1a1a2e" : "white",
                  color:      tab === i ? "white"  : "#888",
                  boxShadow:  tab === i
                    ? "0 4px 14px rgba(26,26,46,0.25)"
                    : "0 2px 8px rgba(0,0,0,0.06)",
                  transition:"all 0.2s",
                }}>{t}</button>
              ))}
            </div>

            {/* ---- Tab 0: 住宅 ---- */}
            {tab === 0 && (
              <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
                <Section title="🏠 住宅購入シミュレーション" accent="#4361ee">
                  <Slider label="物件価格" value={buyPrice} min={2000} max={10000} step={100} onChange={setBuyPrice} unit="万円" />
                  <Slider label="頭金" value={downPay} min={0} max={2000} step={50} onChange={setDownPay} unit="万円"
                    note={`借入額: ${housing.loanAmt}万円`} />
                  <Slider label="金利（年）" value={rate} min={0.3} max={3.5} step={0.05} onChange={setRate} unit="%" />
                  <Slider label="返済期間" value={loanYears} min={10} max={35} step={1} onChange={setLoanYears} unit="年" />
                  <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                    <Stat label="月返済額"       value={`${housing.monthlyLoan}万円`} big />
                    <Stat label="総利息"         value={formatMan(housing.totalInterest)} color="#f72585" />
                    <Stat label="総支払（購入）" value={formatMan(housing.buyTotal)}    color="#f72585" />
                  </div>
                </Section>

                <Section title="🔑 賃貸 vs 購入 比較" accent="#7209b7">
                  <Slider label="現在の家賃"         value={rent}         min={8}  max={20} step={0.1} onChange={setRent}         unit="万円" />
                  <Slider label="住宅補助（月）"      value={subsidy}      min={0}  max={8}  step={0.5} onChange={setSubsidy}      unit="万円" />
                  <Slider label="補助が出る残り期間"  value={subsidyYears} min={0}  max={15} step={1}   onChange={setSubsidyYears} unit="年" />
                  <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginTop:8 }}>
                    <Stat label={`${loanYears}年間・賃貸総額`} value={formatMan(housing.rentNet)} color="#7209b7" />
                    <Stat label={`${loanYears}年間・購入総額`} value={formatMan(housing.buyTotal)} color="#4361ee" />
                    <Stat
                      label={housing.diff > 0 ? "購入が得な額" : "賃貸が得な額"}
                      value={formatMan(Math.abs(housing.diff))}
                      color={housing.diff > 0 ? "#06d6a0" : "#f72585"}
                      big
                    />
                  </div>
                  <div style={{
                    marginTop:16, padding:"14px 18px", borderRadius:12,
                    background: housing.diff > 0 ? "#f0fff8" : "#fff0f5",
                    fontSize:13, color:"#333", lineHeight:1.7
                  }}>
                    {housing.diff > 0
                      ? `✅ ${loanYears}年間トータルで購入が約${formatMan(housing.diff)}お得。住宅補助が出るうちに頭金を貯めるのが現実的な戦略。`
                      : `⚠️ 補助込みの賃貸が約${formatMan(Math.abs(housing.diff))}お得。補助が切れるタイミングで再検討が吉。`
                    }
                  </div>
                </Section>
              </div>
            )}

            {/* ---- Tab 1: NISA ---- */}
            {tab === 1 && (
              <Section title="📈 NISA積立シミュレーション" accent="#06d6a0">
                <Slider label="月積立額"   value={nisaMonthly} min={1}  max={10} step={0.5} onChange={setNisaMonthly} unit="万円" />
                <Slider label="積立期間"   value={nisaYears}   min={5}  max={30} step={1}   onChange={setNisaYears}   unit="年" />
                <Slider label="年利（想定）" value={nisaReturn} min={2}  max={10} step={0.5} onChange={setNisaReturn}  unit="%"
                  note={'S&P500長期平均は約7%'} />
                <div style={{ display:"flex", gap:12, flexWrap:"wrap", margin:"20px 0" }}>
                  <Stat label="元本総額"   value={`${nisa.invested}万円`}      color="#888" />
                  <Stat label="運用益"     value={formatMan(nisa.gain)}         color="#06d6a0" />
                  <Stat label="最終評価額" value={formatOkuMan(nisa.total)} big color="#1a1a2e" />
                </div>
                <BarChart data={nisa.chartData} maxVal={Math.max(...nisa.chartData.map(d => d.val))} color="#06d6a0" />
                <div style={{ marginTop:16, padding:"14px 18px", borderRadius:12, background:"#f0fff8", fontSize:13, color:"#333", lineHeight:1.7 }}>
                  💡 月{nisaMonthly}万円×{nisaYears}年で元本{nisa.invested}万円 → 複利で約{formatOkuMan(nisa.total)}。運用益は非課税なので実質利回りはさらに上。
                </div>
              </Section>
            )}

            {/* ---- Tab 2: 家計 ---- */}
            {tab === 2 && (
              <Section title="💰 家計バランス" accent="#f72585">
                <Slider label="自分の共有財布への拠出（月）" value={myContrib}   min={8}  max={25} step={0.5} onChange={setMyContrib}   unit="万円" />
                <Slider label="妻の共有財布への拠出（月）"   value={wifeContrib} min={5}  max={20} step={0.5} onChange={setWifeContrib} unit="万円" />
                <div style={{ display:"flex", gap:12, flexWrap:"wrap", margin:"20px 0" }}>
                  <Stat label="共有財布 月収入計" value={`${household.total}万円`} big />
                  <Stat label="家賃（実質負担）"
                    value={`${Math.round((rent - subsidy) * 10) / 10}万円`}
                    color="#f72585"
                    sub={`補助${subsidy}万差引後`} />
                  <Stat label="住居費後の月余力" value={`${household.afterHousing}万円`} color="#06d6a0" big />
                </div>
                <div style={{ marginTop:4 }}>
                  <div style={{ display:"flex", height:24, borderRadius:12, overflow:"hidden" }}>
                    <div style={{ flex: rent - subsidy,          background:"#f72585" }} />
                    <div style={{ flex: household.afterHousing,  background:"#4361ee" }} />
                  </div>
                  <div style={{ display:"flex", gap:16, marginTop:8, fontSize:11, color:"#888" }}>
                    <span>🔴 家賃実質負担 {Math.round((rent-subsidy)*10)/10}万</span>
                    <span>🔵 生活費・貯蓄余力 {household.afterHousing}万</span>
                  </div>
                </div>
                <div style={{ marginTop:16, padding:"14px 18px", borderRadius:12, background:"#fff0f8", fontSize:13, color:"#333", lineHeight:1.7 }}>
                  💡 住宅購入後に月返済が{housing.monthlyLoan}万円になると、余力は約
                  {Math.round((household.afterHousing - housing.monthlyLoan + (rent - subsidy)) * 10) / 10}
                  万円に変化。NISA継続との両立を試算してみよう。
                </div>
              </Section>
            )}

            {/* ---- Tab 3: 株スクリーニング ---- */}
            {tab === 3 && <ScreenerTab />}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
